<div class="page-container" [class.sidebar-open]="sidebarOpen()">
  <div class="factura-card">
    <header class="list-header">
      <div class="header-top">
        <h1 class="main-title">
          <mat-icon>format_list_bulleted</mat-icon>
          LISTADO DE USUARIOS
        </h1>

        <div class="header-actions">
          <app-boton-propio
            [texto]="'Nuevo Usuario'"
            [variante]="'success'"
            (pulsado)="showUserDetails()"
          />
        </div>
      </div>
    </header>

    <app-data-table
      [data]="users()"
      [columns]="columns"
      [filters]="filters"
      [rowClickable]="true"
      (rowDblClick)="abrirDetalle($event)"
      emptyMessage="No hay usuarios registrados en este momento."
    >
      <ng-template #actions let-user>
        <app-boton-propio
          [texto]="'Editar'"
          (pulsado)="showUserDetails(user.idUser)"
        />
        <app-boton-propio
          appConfirm
          action="delete"
          [message]="'¿Estás seguro de que deseas eliminar el usuario?'"
          (confirmed)="deleteUser(user.idUser)"
          [texto]="'Borrar'"
          [variante]="'danger'"
        />
      </ng-template>
    </app-data-table>
  </div>

  <div class="sidebar-overlay" (click)="cerrarSidebar()"></div>
  <aside class="sidebar" [class.open]="sidebarOpen()">
    @if (sidebarOpen()) {
      <app-user-detail-sidebar
        [userId]="selectedUserId()"
        (onClose)="cerrarSidebar()"
        (onEdit)="editarDesdeSidebar($event)"
      />
    }
  </aside>
</div>

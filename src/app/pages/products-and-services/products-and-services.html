<div class="page-container" [class.sidebar-open]="sidebarOpen()">
  <div class="factura-card">
    <header class="list-header">
      <div class="header-top">
        <h1 class="main-title">
          <mat-icon>format_list_bulleted</mat-icon>
          PRODUCTOS Y SERVICIOS
        </h1>

        <div class="header-actions">
          <app-boton-propio
            [texto]="'Nuevo Producto/Servicio'"
            [variante]="'success'"
            (pulsado)="createProduct()"
          />
        </div>
      </div>
    </header>

    <app-data-table
      [data]="products()"
      [columns]="columns"
      [filters]="filters"
      [rowClickable]="true"
      (rowDblClick)="showProductDetails($event)"
      emptyMessage="No hay productos registrados en este momento."
    >
      <ng-template #actions let-product>
        <app-boton-propio
          [icono]="'edit'"
          [ariaLabel]="'Editar'"
          (pulsado)="showProductDetails(product)"
        />
        <app-boton-propio
          appConfirm
          action="delete"
          [message]="'¿Estás seguro de que deseas eliminar el producto?'"
          (confirmed)="deleteProduct(product.productId)"
          [icono]="'delete'"
          [ariaLabel]="'Borrar'"
          [variante]="'danger'"
        />
      </ng-template>
    </app-data-table>
  </div>

  <div class="sidebar-overlay" (click)="closeSidebar()"></div>
  <aside class="sidebar" [class.open]="sidebarOpen()">
    @if (sidebarOpen()) {
      <app-product-service-details
        [productId]="selectedProductId()"
        (onClose)="closeSidebar()"
      />
    }
  </aside>
</div>

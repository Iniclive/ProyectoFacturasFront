<div class="forbidden-wrap">
      <div class="icon-circle">
        <mat-icon>lock</mat-icon>
      </div>

      <span class="code-badge">403 Forbidden</span>
      <h1>Acceso denegado</h1>
      <p class="subtitle">
        No tienes permiso para ver esta factura.
        Si crees que esto es un error, contacta con el administrador.
      </p>

      <div class="actions">
        <app-boton-propio
          [texto]="'Volver a la página principal'"
          [variante]="'neutral'"
          [routerLink]="'/facturas'">
        </app-boton-propio>
      </div>
</div>

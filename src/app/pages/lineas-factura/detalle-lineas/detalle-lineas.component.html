<div class="dialog-container">
  <header class="dialog-header">
    <h2 class="dialog-title">
      <mat-icon>receipt_long</mat-icon>
      {{ data.tempId ? 'Editar Línea' : 'Nueva Línea' }}
    </h2>
  </header>

  <div class="form-grid">

    <!-- Material -->
    <div class="campo">
      <label>Material</label>
      <select
        class="modern-select"
        [class.input-error]="mostrarErrorMaterial()"
        [ngModel]="linea().idMaterial"
        (ngModelChange)="actualizarCampo({idMaterial: +$event})">
        <option [value]="0" disabled>Selecciona un material</option>
        @for (material of materials(); track material.idMaterial) {
          <option [value]="material.idMaterial">{{ material.name }}</option>
        }
      </select>
      <app-form-error [mostrar]="mostrarErrorMaterial()" mensaje="Selecciona un material" />
    </div>

    <!-- Cantidad -->
    <div class="campo">
      <label>Cantidad</label>
      <input
        class="modern-input"
        type="number"
        min="1"
        [ngModel]="linea().cantidad"
        (ngModelChange)="actualizarCampo({cantidad : +$event})"
        placeholder="0"
      />
    </div>

    <!-- Importe -->
    <div class="campo">
      <label>Importe (€)</label>
      <input
        class="modern-input"
        type="number"
        min="0"
        step="0.01"
        [ngModel]="linea().importe"
        (ngModelChange)="actualizarCampo({importe: +$event})"
        placeholder="0.00"
      />
    </div>

    <!-- Importe Total (readonly) -->
    <div class="campo">
      <label>Importe Total (€)</label>
      <input
        class="modern-input readonly-input"
        type="number"
        [ngModel]="importeTotal()"
        readonly
        placeholder="0.00"
      />
    </div>

  </div>

  <div class="dialog-actions">
    <app-boton-propio
      [texto]="'Cancelar'"
      [tipoBoton]="'delete'"
      (pulsado)="cancelar()">
    </app-boton-propio>
    <app-boton-propio
      [texto]="'Guardar Línea'"
      [color]="'#27ae60'"
      (pulsado)="guardar()">
    </app-boton-propio>
  </div>
</div>

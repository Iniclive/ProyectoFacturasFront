<div class="dialog-container">
  <div class="dialog-body">
    <div class="icon-wrapper" [style.background-color]="resolvedColor() + '18'">
      <mat-icon class="dialog-icon" [style.color]="resolvedColor()">
        {{ resolvedIcon() }}
      </mat-icon>
    </div>
    <h2 mat-dialog-title class="dialog-title">{{ data().title }}</h2>
    <p class="dialog-message">{{ data().message }}</p>
  </div>

  <mat-dialog-actions class="dialog-actions">
    <app-boton-propio
      [texto]="data().cancelText || 'Cancelar'"
      variante="neutral"
      (pulsado)="onCancel()"
    />
    <app-boton-propio
      [texto]="data().confirmText || 'Confirmar'"
      [color]="resolvedColor()"
      (pulsado)="onConfirm()"
    />
  </mat-dialog-actions>
</div>

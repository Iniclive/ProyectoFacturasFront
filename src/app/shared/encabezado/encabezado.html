<header class="main-header">
  <div class="header-content">
    <div class="logo-area">
      <div class="icon-circle">
        <mat-icon>assessment</mat-icon>
      </div>
      <div class="title-group clickable-logo" routerLink="/facturas">
        <h1>Proyecto Facturas</h1>
        <p class="subtitle">Gestión Administrativa v1.0</p>
      </div>
    </div>

    <nav class="header-nav">
       <span class="user-tag">Admin Panel</span>
    </nav>
    @if(isAutenticated()){
      <nav class="header-nav">
         <app-boton-propio
                  appConfirm
                  action="logout"
                  (confirmed)="logout()"
                  [texto]="'Logout'"
                >
                </app-boton-propio>
    </nav>
    }


  </div>
</header>

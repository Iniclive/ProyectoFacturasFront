<header class="main-header">
  <div class="header-content">
    <div class="logo-area clickable-logo" routerLink="/dashboard">
      <img class="brand-logo" src="logo-wordmark.svg" alt="FacturSim" />
      <span class="subtitle">Sistema de facturación</span>
    </div>

    @if (isAutenticated()) {
      <div class="header-actions">
        <div class="user-menu-root">
          <button
            type="button"
            class="user-avatar-btn"
            (click)="toggleUserMenu()"
            [attr.aria-expanded]="userMenuOpen()"
            aria-haspopup="menu"
            aria-label="Menú de usuario"
          >
            <span class="avatar-initial">{{ userInitial() }}</span>
          </button>

          @if (userMenuOpen()) {
            <div class="user-menu-panel" role="menu">
              <button
                type="button"
                class="user-menu-item"
                role="menuitem"
                (click)="goToProfile()"
              >
                <mat-icon>account_circle</mat-icon>
                Mi Perfil
              </button>
              <div class="mobile-menu-divider"></div>
              <button
                type="button"
                class="user-menu-item user-menu-logout"
                role="menuitem"
                appConfirm
                action="logout"
                (confirmed)="logout()"
              >
                <mat-icon>logout</mat-icon>
                Cerrar sesión
              </button>
            </div>
          }
        </div>

        <div class="mobile-menu-root">
        <button
          type="button"
          class="mobile-menu-toggle"
          (click)="toggleMobileMenu()"
          [attr.aria-expanded]="mobileMenuOpen()"
          aria-label="Abrir menú de navegación"
        >
          <mat-icon>{{ mobileMenuOpen() ? 'close' : 'menu' }}</mat-icon>
        </button>

        @if (mobileMenuOpen()) {
          <div class="mobile-menu-panel" role="menu">
            <a
              routerLink="/dashboard"
              routerLinkActive="active-link"
              class="mobile-nav-link"
              (click)="closeMobileMenu()"
            >
              <mat-icon>dashboard</mat-icon>
              Dashboard
            </a>
            <a
              routerLink="/facturas"
              routerLinkActive="active-link"
              class="mobile-nav-link"
              (click)="closeMobileMenu()"
            >
              <mat-icon>receipt_long</mat-icon>
              Facturas
            </a>
            <a
              routerLink="/clients"
              routerLinkActive="active-link"
              class="mobile-nav-link"
              (click)="closeMobileMenu()"
            >
              <mat-icon>group</mat-icon>
              Clientes
            </a>
            <a
              routerLink="/products"
              routerLinkActive="active-link"
              class="mobile-nav-link"
              (click)="closeMobileMenu()"
            >
              <mat-icon>work_outline</mat-icon>
              Productos
            </a>
            @if (currentUser()?.role === 'admin') {
              <a
                routerLink="/users"
                routerLinkActive="active-link"
                class="mobile-nav-link"
                (click)="closeMobileMenu()"
              >
                <mat-icon>person</mat-icon>
                Usuarios
              </a>
            }
            <div class="mobile-menu-divider"></div>
            <button
              type="button"
              class="mobile-nav-link mobile-nav-logout"
              appConfirm
              action="logout"
              (confirmed)="logout()"
            >
              <mat-icon>logout</mat-icon>
              Cerrar sesión
            </button>
          </div>
        }
        </div>
      </div>
    }
  </div>
</header>

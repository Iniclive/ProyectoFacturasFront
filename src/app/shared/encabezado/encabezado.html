<header class="main-header">
  <div class="header-content">
    <div class="logo-area">
      <div class="icon-circle">
        <mat-icon>assessment</mat-icon>
      </div>
      <div class="title-group clickable-logo" routerLink="/facturas">
        <h1>Proyecto Facturas</h1>
        <p class="subtitle">Gestión Administrativa v1.0</p>
      </div>
    </div>
    @if(isAutenticated() && (currentUser()?.role === 'admin')) {
      <nav class="header-nav">
        <a
          routerLink="/facturas"
          routerLinkActive="active-link"
          class="nav-link"
        >
          <mat-icon>receipt_long</mat-icon>
          Facturas
        </a>
        <a
          routerLink="/users"
          routerLinkActive="active-link"
          class="nav-link"
        >
          <mat-icon>person</mat-icon>
          Usuarios
        </a>
       <span class="user-tag">Admin Panel</span>
    </nav>
    }

    @if(isAutenticated()){
      <nav class="header-nav">
         <app-boton-propio
                  appConfirm
                  action="logout"
                  (confirmed)="logout()"
                  [texto]="'Logout'"
                >
                </app-boton-propio>
    </nav>
    }


  </div>
</header>
